spring.application.name=ncs-core
# Database Connection Settings
#spring.datasource.url=jdbc:postgresql://localhost:5432/ncs_db
#spring.datasource.username=postgres
#spring.datasource.password=Root@123456
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' automatically creates/modifies database tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

logging.level.org.springframework.security=TRACE

# Custom Absolute Directory Path for Student Photographs
# Change this to an appropriate path on your machine (use forward slashes even on Windows)
#app.upload.dir=C:/ncs_uploads/student_photos/