spring.application.name=ncs-core

# ===================================================================
# DYNAMIC DATABASE CONNECTION CONFIGURATION
# ===================================================================
# Uses the cloud environment variables if present, otherwise defaults back to localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ncs_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE ARCHITECTURE PROPERTIES
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 'update' automatically synchronizes database structural changes smoothly
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Controlled sequencing for initial data seeding engines
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# ENVIRONMENTAL STORAGE PATHS & DIAGNOSTICS
# ===================================================================
# Security execution tracing configuration
logging.level.org.springframework.security=TRACE

# Dynamic Storage Path: Uses cloud environment directory path wrapper if active,
# otherwise defaults to a safe relative folder inside your project directory execution root.
app.upload.dir=${APP_UPLOAD_DIR:./ncs_uploads/student_photos/}