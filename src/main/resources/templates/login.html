<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalanda Convent Sr. Sec. School - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        .school-logo {
            width: 80px;
            margin-bottom: 15px;
            height: auto;
        }
        h2 {
            margin: 0 0 5px 0;
            color: #b32e2e; /* Deep red theme colors */
            font-size: 22px;
            letter-spacing: 0.5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin: 0 0 25px 0;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #b32e2e;
            outline: none;
        }
        .btn-login {
            background: #b32e2e;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }
        .btn-login:hover {
            background: #912323;
        }
        .alert-msg {
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: left;
            display: none; /* Hidden by default, toggled via JS */
        }
        .error-msg {
            color: #e74c3c;
            background: #fde8e8;
            border-left: 4px solid #e74c3c;
        }
        .success-msg {
            color: #27ae60;
            background: #e8f8f0;
            border-left: 4px solid #27ae60;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img th:src="@{/images/logo.png}" alt="School Logo" class="school-logo" onerror="this.style.display='none'">
    <h2>NALANDA CONVENT SCHOOL</h2>
    <p>Internal Management Portal</p>

    <form id="loginForm">

        <div id="errorBox" class="alert-msg error-msg"></div>
        <div id="successBox" class="alert-msg success-msg"></div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
